
<div class="dashboard-container" [class.is-mobile]="mobileQuery.matches">
  <mat-toolbar color="primary" class="dashboard-toolbar">
    <button mat-icon-button (click)="snav.toggle()"><mat-icon class="mat-18">menu</mat-icon></button>
      <span class="app-name">Sistema Inventario</span>

      <div fxFlex fxLayout="row" fxLayoutAlign="flex-end">
        <ul fxLayout="row" fxLayoutGap="20px">
          <li>
            <button mat-icon-button><mat-icon>help_outline</mat-icon></button>
          </li>
          <li>
            <button mat-icon-button [matMenuTriggerFor]="menu"><mat-icon>person_outline</mat-icon></button>
            <mat-menu #menu>
              <app-user-profile-card></app-user-profile-card>
              <mat-divider></mat-divider>
              <app-logout-menu-item></app-logout-menu-item>
            </mat-menu>
          </li>
        </ul>

      </div>

  </mat-toolbar>
<!-- termina toolbar-->

<!-- empieza sidenav-->
<mat-sidenav-container class="sidenav-container"
[style.marginTop.px]="mobileQuery.matches ? 56 : 0">

    <mat-sidenav #snav [mode]="mobileQuery.matches? 'over' : 'side'"
    [fixedInViewport]="mobileQuery.matches" fixedTopGap="56">
        <mat-nav-list>
          <a
          mat-list-item [routerLink]="nav.route" *ngFor="let nav of menuNav">
            <mat-icon class="icono">{{ nav.icon }}</mat-icon>
            {{ nav.name }}
          </a>
        </mat-nav-list>
    </mat-sidenav>

    <!-- Body -->

    <mat-sidenav-container>
       <router-outlet></router-outlet>
    </mat-sidenav-container>

</mat-sidenav-container>

</div>
