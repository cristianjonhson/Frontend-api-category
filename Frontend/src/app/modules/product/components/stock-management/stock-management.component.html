<section class="stock-container">
  <h2>Gestión de stock</h2>

  <p class="subtitle">Existencias actuales, stock mínimo, máximo y disponible por producto.</p>

  <div class="loading" *ngIf="loading">Cargando stock...</div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z1" *ngIf="!loading">
    <ng-container matColumnDef="productName">
      <th mat-header-cell *matHeaderCellDef>Producto</th>
      <td mat-cell *matCellDef="let row">{{ row.productName }}</td>
    </ng-container>

    <ng-container matColumnDef="currentStock">
      <th mat-header-cell *matHeaderCellDef>Existencias actuales</th>
      <td mat-cell *matCellDef="let row">{{ row.currentStock }}</td>
    </ng-container>

    <ng-container matColumnDef="minStock">
      <th mat-header-cell *matHeaderCellDef>Stock mínimo</th>
      <td mat-cell *matCellDef="let row">{{ row.minStock }}</td>
    </ng-container>

    <ng-container matColumnDef="maxStock">
      <th mat-header-cell *matHeaderCellDef>Stock máximo</th>
      <td mat-cell *matCellDef="let row">{{ row.maxStock }}</td>
    </ng-container>

    <ng-container matColumnDef="availableStock">
      <th mat-header-cell *matHeaderCellDef>Disponible</th>
      <td mat-cell *matCellDef="let row">{{ row.availableStock }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <app-shared-paginator
    [hidden]="loading"
    #sharedPaginator
    [pageSizeOptions]="paginatorConfig.PAGE_SIZE_OPTIONS"
    [showFirstLastButtons]="paginatorConfig.SHOW_FIRST_LAST_BUTTONS"
    [pageSize]="paginatorConfig.DEFAULT_PAGE_SIZE"
    (page)="onPageChange($event)">
  </app-shared-paginator>
</section>
