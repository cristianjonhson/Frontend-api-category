<section class="supplier-container">
  <h2>Proveedores</h2>
  <p class="subtitle">Datos de proveedores y relación con productos.</p>

  <div class="filters">
    <mat-form-field appearance="outline" class="filter">
      <mat-label>Buscar proveedor</mat-label>
      <input matInput [formControl]="searchControl" placeholder="Nombre, email o teléfono" />
    </mat-form-field>

    <button mat-stroked-button type="button" (click)="clearFilters()" [disabled]="!hasActiveFilters()">
      Limpiar filtros
    </button>
  </div>

  <div class="actions">
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
      Añadir proveedor
    </button>
  </div>

  <div class="loading" *ngIf="loading">Cargando proveedores...</div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z1" *ngIf="!loading">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Proveedor</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let row">{{ row.email }}</td>
    </ng-container>

    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef>Teléfono</th>
      <td mat-cell *matCellDef="let row">{{ row.phone }}</td>
    </ng-container>

    <ng-container matColumnDef="productsCount">
      <th mat-header-cell *matHeaderCellDef>Productos relacionados</th>
      <td mat-cell *matCellDef="let row">{{ row.productsCount }}</td>
    </ng-container>

    <ng-container matColumnDef="productsLabel">
      <th mat-header-cell *matHeaderCellDef>Detalle de productos</th>
      <td mat-cell *matCellDef="let row">{{ row.productsLabel }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button color="accent" (click)="openEditDialog(row)" aria-label="Editar proveedor">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="onDeleteSupplier(row)" aria-label="Eliminar proveedor">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <app-shared-paginator
    *ngIf="!loading"
    #sharedPaginator
    [pageSizeOptions]="paginatorConfig.PAGE_SIZE_OPTIONS"
    [showFirstLastButtons]="paginatorConfig.SHOW_FIRST_LAST_BUTTONS"
    [pageSize]="paginatorConfig.DEFAULT_PAGE_SIZE"
    (page)="onPageChange($event)">
  </app-shared-paginator>
</section>
